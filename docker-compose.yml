version: '3.8'

services:
  api:
    build:
      context: .
      target: production
    container_name: triage-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=sqlite:///./data/triage_surveillance.db
      - MODEL_CACHE_DIR=./data/models
      - VECTOR_DB_PATH=./data/vector_db
      - MIMIC_DATA_PATH=./data/mimic_iv_ed
      - LOG_LEVEL=INFO
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dashboard/static:/app/dashboard/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - triage-network

  redis:
    image: redis:7-alpine
    container_name: triage-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - triage-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: triage-postgres
  #   environment:
  #     - POSTGRES_DB=triage_db
  #     - POSTGRES_USER=triage_user
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-this}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped
  #   networks:
  #     - triage-network

networks:
  triage-network:
    driver: bridge

volumes:
  redis-data:
  # postgres-data:

